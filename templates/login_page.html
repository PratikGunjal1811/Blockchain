<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>StockFlow - Login</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&family=Rubik:wght@400;500&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <link href="static/landing/lib/animate/animate.min.css" rel="stylesheet">
    <link href="static/landing/lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

    <link href="static/landing/css/bootstrap.min.css" rel="stylesheet">

    <link href="static/landing/css/style.css" rel="stylesheet">
</head>

<body>

    <div class="container-fluid header position-relative overflow-hidden p-0">
        <nav class="navbar navbar-expand-lg fixed-top navbar-light px-4 px-lg-5 py-3 py-lg-0">
            <a href="/" class="navbar-brand p-0">
                <h1 class="display-6 text-primary m-0">
                    <i class="fas fa-chart-line me-3"></i>StockFlow
                </h1>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
                <span class="fa fa-bars"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarCollapse">
                <div class="navbar-nav ms-auto py-0">
                    <a href="/" class="nav-item nav-link active">Home</a>
                </div>
                <a href="user_register"
                    class="btn btn-light border border-primary rounded-pill text-primary py-2 px-4 me-4">User
                    Login</a>
                <a href="company_register"
                    class="btn btn-light border border-primary rounded-pill text-primary py-2 px-4 me-4">Company
                    Login</a>
                <a href="login_page" class="btn btn-primary rounded-pill text-white py-2 px-4">Admin Login</a>
            </div>
        </nav>

        <div class="hero-header overflow-hidden px-5 d-flex align-items-center" style="min-height: 100vh;">
            <div class="rotate-img">
                <img src="img/sty-1.png" class="img-fluid w-100" alt="">
                <div class="rotate-sty-2"></div>
            </div>

            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-5 col-md-8 wow fadeInUp" data-wow-delay="0.2s">
                        <div class="card border-0 shadow-lg p-4"
                            style="border-radius: 20px; background: rgba(255, 255, 255, 0.95);">
                            <div class="card-body">
                                <div class="text-center mb-4">
                                    <h2 class="fw-bold text-primary">Login</h2>
                                    <p class="text-muted">Welcome back! Please enter your details.</p>
                                </div>

                                <form action="" method="POST">
                                    {% csrf_token %}
                                    <div class="mb-3">
                                        <label class="form-label text-dark fw-medium">Username or Email</label>
                                        <div class="input-group border rounded-pill px-3 py-1">
                                            <span class="input-group-text bg-transparent border-0"><i
                                                    class="fas fa-user text-primary"></i></span>
                                            <input type="text" class="form-control border-0 bg-transparent"
                                                name="username" placeholder="Enter username" required
                                                style="box-shadow: none;">
                                        </div>
                                    </div>

                                    <div class="mb-4">
                                        <div class="d-flex justify-content-between">
                                            <label class="form-label text-dark fw-medium">Password</label>
                                        </div>
                                        <div class="input-group border rounded-pill px-3 py-1">
                                            <span class="input-group-text bg-transparent border-0"><i
                                                    class="fas fa-lock text-primary"></i></span>
                                            <input type="password" class="form-control border-0 bg-transparent"
                                                name="password" placeholder="Enter password" required
                                                style="box-shadow: none;">
                                        </div>
                                    </div>

                                    <div class="d-grid">
                                        <button type="submit"
                                            class="btn btn-primary rounded-pill py-3 fw-bold text-white">Sign
                                            In</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/landing/lib/wow/wow.min.js"></script>
    <script src="static/landing/lib/easing/easing.min.js"></script>
    <script src="static/landing/lib/waypoints/waypoints.min.js"></script>
    <script src="static/landing/lib/counterup/counterup.min.js"></script>
    <script>new WOW().init();</script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        {% if messages %}
        {% for message in messages %}
        Swal.fire({
            icon: "{% if message.tags == 'success' %}success{% else %}error{% endif %}",
            title: "{{ message.tags|title }}",
            text: "{{ message }}",
            timer: 3000,
            showConfirmButton: false
        });
        {% endfor %}
        {% endif %}
    </script>
</body>

</html>
