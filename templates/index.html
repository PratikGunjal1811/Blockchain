<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>StockFlow</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&family=Rubik:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- static/landing/Libraries Stylesheet -->
    <link href="static/landing/lib/animate/animate.min.css" rel="stylesheet">
    <link href="static/landing/lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">
    <link href="static/landing/lib/lightbox/css/lightbox.min.css" rel="stylesheet">


    <!-- Customized Bootstrap Stylesheet -->
    <link href="static/landing/css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="static/landing/css/style.css" rel="stylesheet">
</head>

<body>

    <!-- Spinner Start -->
    <!-- <div id="spinner" class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
            <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
                <span class="sr-only">Loading...</span>
            </div>
        </div> -->
    <!-- Spinner End -->


    <!-- Navbar & Hero Start -->
    <div class="container-fluid header position-relative overflow-hidden p-0">
        <nav class="navbar navbar-expand-lg fixed-top navbar-light px-4 px-lg-5 py-3 py-lg-0">
            <a href="/" class="navbar-brand p-0">
                <h1 class="display-6 text-primary m-0">
                    <i class="fas fa-chart-line me-3"></i>StockFlow
                </h1>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
                <span class="fa fa-bars"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarCollapse">
                <div class="navbar-nav ms-auto py-0">
                    <a href="/" class="nav-item nav-link active">Home</a>
                </div>
                <a href="user_register"
                    class="btn btn-light border border-primary rounded-pill text-primary py-2 px-4 me-4">User
                    Login</a>
                <a href="company_register"
                    class="btn btn-light border border-primary rounded-pill text-primary py-2 px-4 me-4">Company
                    Login</a>
                <a href="login_page" class="btn btn-primary rounded-pill text-white py-2 px-4">Admin Login</a>
            </div>
        </nav>


        <!-- Hero Header Start -->
        <div class="hero-header overflow-hidden px-5">
            <div class="rotate-img">
                <img src="img/sty-1.png" class="img-fluid w-100" alt="">
                <div class="rotate-sty-2"></div>
            </div>
            <div class="row gy-5 align-items-center">
                <div class="col-lg-6">
                    <h1 class="display-4 text-dark mb-4">
                        Trade Smart with StockFlow
                    </h1>

                    <p class="mb-4">
                        Buy and sell shares, track your portfolio, and monitor profit or loss in real-time.
                        All transactions are securely stored using blockchain technology.
                    </p>

                    <a href="login_page" class="btn btn-primary rounded-pill py-3 px-5">
                        Start Trading
                    </a>
                </div>

                <div class="col-lg-6">
                    <img src="static/landing/img/Untitled design.png" class="img-fluid w-100 h-100" alt="Stock Trading">
                </div>
            </div>
        </div>
        <!-- Hero Header End -->
    </div>
    <!-- Navbar & Hero End -->

    <!-- Copyright End -->

    <!-- JavaScript static/landing/Libraries -->
    <script src="https://ajax.googleapis.com/ajax/static/landing/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/landing/lib/wow/wow.min.js"></script>
    <script src="static/landing/lib/easing/easing.min.js"></script>
    <script src="static/landing/lib/waypoints/waypoints.min.js"></script>
    <script src="static/landing/lib/counterup/counterup.min.js"></script>
    <script src="static/landing/lib/owlcarousel/owl.carousel.min.js"></script>
    <script src="static/landing/lib/lightbox/js/lightbox.min.js"></script>


    <!-- Template Javascript -->
    <script src="js/main.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        {% if messages %}
        {% for message in messages %}
        Swal.fire({
            icon: "{% if message.tags == 'success' %}success{% else %}error{% endif %}",
            title: "{{ message.tags|title }}",
            text: "{{ message }}",
            timer: 3000,
            showConfirmButton: false
        });
        {% endfor %}
        {% endif %}
    </script>
</body>

</html>
